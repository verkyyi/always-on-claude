services:
  dev:
    image: ghcr.io/verkyyi/always-on-claude:latest
    container_name: claude-dev
    hostname: claude-dev
    stdin_open: true
    tty: true
    volumes:
      # Claude Code config/auth/history (bind mount to persist through down/up)
      - ~/.claude:/home/dev/.claude

      # Claude Code onboarding state — lives OUTSIDE ~/.claude/
      # Without this, every down/up triggers full re-onboarding
      # IMPORTANT: run `touch ~/.claude.json` on host before first start
      - ~/.claude.json:/home/dev/.claude.json

      # Git config
      - ~/.gitconfig.d:/home/dev/.gitconfig.d

      # Your projects — bind mount so files are visible directly on the host
      # Create ~/projects on the host before first start
      - ~/projects:/home/dev/projects

      # GitHub CLI config/auth (shared between host and container)
      - ~/.config/gh:/home/dev/.config/gh

      # SSH keys for GitHub (read-only)
      - ~/.ssh:/home/dev/.ssh:ro

      # known_hosts needs to be writable so SSH can record new host fingerprints
      # Mount as a single file (overrides the ro mount for just this file)
      - ~/.ssh/known_hosts:/home/dev/.ssh/known_hosts

    environment:
      - NODE_ENV=development

    # Host networking for full network access (EC2 metadata, local services, etc.)
    network_mode: host

    restart: unless-stopped

  # Caddy reverse proxy — routes *.{workspace-id}.{domain} to deployed apps
  # Only needed when app deployment is configured (WORKSPACE_ID + WORKSPACE_DOMAIN set)
  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    container_name: caddy
    profiles:
      - deploy
    volumes:
      # Caddyfile template
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro

      # Per-app route configs (written by deploy.sh)
      - caddy-apps:/etc/caddy/apps

      # Cert persistence across restarts
      - caddy-data:/data
      - caddy-config:/config

      # Deployed apps registry (shared with dev container)
      - ~/.deployed-apps.json:/etc/caddy/deployed-apps.json:ro

    environment:
      - WORKSPACE_ID=${WORKSPACE_ID:-}
      - WORKSPACE_DOMAIN=${WORKSPACE_DOMAIN:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}

    # Host networking so Caddy can reach apps on localhost ports
    network_mode: host

    restart: unless-stopped

volumes:
  caddy-apps:
  caddy-data:
  caddy-config:
