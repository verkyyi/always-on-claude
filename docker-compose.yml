services:
  dev:
    image: ${DOCKER_IMAGE:-ghcr.io/verkyyi/always-on-claude:latest}
    container_name: ${CONTAINER_NAME:-claude-dev}
    hostname: ${CONTAINER_HOSTNAME:-claude-dev}
    stdin_open: true
    tty: true
    volumes:
      # Claude Code config/auth/history (bind mount to persist through down/up)
      - ~/.claude:/home/dev/.claude

      # Codex config/auth/history
      - ~/.codex:/home/dev/.codex

      # Claude Code onboarding state — lives OUTSIDE ~/.claude/
      # Without this, every down/up triggers full re-onboarding
      # IMPORTANT: run `touch ~/.claude.json` on host before first start
      - ~/.claude.json:/home/dev/.claude.json

      # Git config
      - ~/.gitconfig.d:/home/dev/.gitconfig.d

      # Your projects — bind mount so files are visible directly on the host
      # Create ~/projects on the host before first start
      - ~/projects:/home/dev/projects

      # GitHub CLI config/auth (shared between host and container)
      - ~/.config/gh:/home/dev/.config/gh

      # Dev-env repo (scripts, configs — read-only, managed on host)
      - ~/dev-env:/home/dev/dev-env:ro

      # AWS CLI config/credentials (shared between host and container)
      - ~/.aws:/home/dev/.aws

      # Host scheduling bridge. Container sessions can submit requests, but
      # status/logs are read-only and jobs are created in host-only paths.
      - ~/.always-on-claude/schedule/inbox:/home/dev/.aoc/schedule/inbox
      - ~/.always-on-claude/schedule/status:/home/dev/.aoc/schedule/status:ro
      - ~/.always-on-claude/schedule/logs:/home/dev/.aoc/schedule/logs:ro

      # SSH keys for GitHub (read-only)
      - ~/.ssh:/home/dev/.ssh:ro

      # known_hosts needs to be writable so SSH can record new host fingerprints
      # Mount as a single file (overrides the ro mount for just this file)
      - ~/.ssh/known_hosts:/home/dev/.ssh/known_hosts

    environment:
      - NODE_ENV=development

    # Memory limits — prevent container from consuming all host RAM
    # Budget: 3GB container + 1GB swap burst, leaves ~600MB for host services
    mem_limit: 3g
    memswap_limit: 4g

    # Host networking for full network access (EC2 metadata, local services, etc.)
    network_mode: host

    restart: unless-stopped
