# docker-compose.mac.yml — Override for local Mac (Docker Desktop / Colima).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.mac.yml up -d
#
# Why: Docker Desktop on macOS doesn't support network_mode: host.
# This override switches to bridge networking. The container is accessed
# via `docker exec`, so no port mappings are needed.

services:
  dev:
    network_mode: bridge

  caddy:
    network_mode: bridge
    ports:
      - "80:80"
      - "443:443"
