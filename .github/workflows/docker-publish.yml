name: Build and publish Docker image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - docker-compose.yml
      - docker-compose.build.yml
      - .github/workflows/docker-publish.yml

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    name: Smoke test published image
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ghcr.io/${{ github.repository }}:latest

      - name: Start container
        run: docker run -d --name smoke-test ghcr.io/${{ github.repository }}:latest sleep infinity

      - name: Verify critical tools
        run: |
          for tool in claude node git gh rg fzf zsh tmux vim jq aws python3 bun curl; do
            docker exec smoke-test which "$tool" \
              && echo "OK: $tool" \
              || { echo "FAIL: $tool not found"; exit 1; }
          done

      - name: Verify user and directories
        run: |
          docker exec smoke-test id | grep -q "uid=1000(dev)" || { echo "FAIL: user"; exit 1; }
          docker exec smoke-test test -d /home/dev/.claude/debug || { echo "FAIL: debug dir"; exit 1; }
          docker exec smoke-test test -f /home/dev/.claude/remote-settings.json || { echo "FAIL: remote-settings"; exit 1; }
          echo "OK: user and directories verified"

      - name: Cleanup
        if: always()
        run: docker rm -f smoke-test 2>/dev/null || true
