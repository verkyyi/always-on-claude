name: Build and publish AMI

on:
  # Run after Docker image is published
  workflow_run:
    workflows: ["Build and publish Docker image"]
    types: [completed]
    branches: [main]

  # Run when install.sh changes (affects AMI contents)
  push:
    branches: [main]
    paths:
      - scripts/deploy/install.sh
      - .github/workflows/build-ami.yml

  # Manual trigger
  workflow_dispatch:

concurrency:
  group: build-ami
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  PROJECT_TAG: always-on-claude

jobs:
  build-ami:
    runs-on: ubuntu-latest
    # Only run if Docker build succeeded (or manual/push trigger)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            instance_type: t4g.small
            ubuntu_ami: ubuntu/images/hvm-ssd-gp3/ubuntu-noble-24.04-arm64-server-*
          - arch: x86_64
            instance_type: t3.small
            ubuntu_ami: ubuntu/images/hvm-ssd-gp3/ubuntu-noble-24.04-amd64-server-*

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create temporary SSH key pair
        run: |
          KEY_NAME="ami-builder-${GITHUB_RUN_ID}-${{ matrix.arch }}"
          aws ec2 create-key-pair \
            --key-name "$KEY_NAME" \
            --query 'KeyMaterial' \
            --output text > /tmp/build-key.pem
          chmod 600 /tmp/build-key.pem
          echo "KEY_NAME=$KEY_NAME" >> "$GITHUB_ENV"

      - name: Find Ubuntu 24.04 AMI
        run: |
          AMI_ID=$(aws ec2 describe-images \
            --owners 099720109477 \
            --filters \
              "Name=name,Values=${{ matrix.ubuntu_ami }}" \
              "Name=state,Values=available" \
            --query 'Images | sort_by(@, &CreationDate) | [-1].ImageId' \
            --output text)
          echo "BASE_AMI=$AMI_ID" >> "$GITHUB_ENV"
          echo "Base AMI: $AMI_ID (${{ matrix.arch }})"

      - name: Find or create security group
        run: |
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=claude-dev-sg" \
            --query 'SecurityGroups[0].GroupId' \
            --output text 2>/dev/null || echo "None")

          if [[ "$SG_ID" == "None" || -z "$SG_ID" ]]; then
            SG_ID=$(aws ec2 create-security-group \
              --group-name "claude-dev-sg" \
              --description "SSH access for always-on Claude Code" \
              --query 'GroupId' --output text)
            aws ec2 create-tags --resources "$SG_ID" \
              --tags Key=Project,Value=${{ env.PROJECT_TAG }}
          fi

          # Ensure SSH rule exists (idempotent — fails silently if already present)
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" --protocol tcp --port 22 --cidr 0.0.0.0/0 2>/dev/null || true

          echo "SG_ID=$SG_ID" >> "$GITHUB_ENV"

      - name: Launch build instance
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id "$BASE_AMI" \
            --instance-type "${{ matrix.instance_type }}" \
            --key-name "$KEY_NAME" \
            --security-group-ids "$SG_ID" \
            --block-device-mappings 'DeviceName=/dev/sda1,Ebs={VolumeSize=20,VolumeType=gp3,DeleteOnTermination=true}' \
            --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=ami-builder-${{ matrix.arch }}},{Key=Project,Value=${{ env.PROJECT_TAG }}}]" \
            --query 'Instances[0].InstanceId' --output text)
          echo "INSTANCE_ID=$INSTANCE_ID" >> "$GITHUB_ENV"
          echo "Instance: $INSTANCE_ID (${{ matrix.arch }})"

      - name: Wait for instance + SSH
        run: |
          aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"

          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
          echo "PUBLIC_IP=$PUBLIC_IP" >> "$GITHUB_ENV"
          echo "IP: $PUBLIC_IP"

          echo "Waiting for SSH..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -o BatchMode=yes \
              -i /tmp/build-key.pem "ubuntu@${PUBLIC_IP}" "echo ok" 2>&1; then
              echo "SSH ready"
              break
            fi
            [ $i -eq 30 ] && { echo "SSH timeout after 30 attempts"; exit 1; }
            sleep 5
          done

      - name: Run install.sh
        run: |
          echo "Copying install.sh to build instance..."
          scp -o StrictHostKeyChecking=no -i /tmp/build-key.pem \
            scripts/deploy/install.sh "ubuntu@${PUBLIC_IP}:/tmp/install.sh"
          echo "Running install.sh..."
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes -i /tmp/build-key.pem \
            "ubuntu@${PUBLIC_IP}" \
            "sudo NON_INTERACTIVE=1 bash /tmp/install.sh"

      - name: Clean instance for snapshot
        run: |
          # install.sh renames ubuntu → dev, so use dev@ for post-install commands
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes -i /tmp/build-key.pem \
            "dev@${PUBLIC_IP}" bash <<'EOF'
          sudo rm -f /etc/ssh/ssh_host_*
          sudo cloud-init clean --logs
          rm -f ~/.bash_history
          cd ~/dev-env && sudo docker compose stop 2>/dev/null || true
          EOF

      - name: Create AMI
        run: |
          AMI_NAME="always-on-claude-$(date +%Y%m%d)-${{ matrix.arch }}-${GITHUB_SHA::7}"
          NEW_AMI=$(aws ec2 create-image \
            --instance-id "$INSTANCE_ID" \
            --name "$AMI_NAME" \
            --description "Always-on Claude Code workspace - Ubuntu 24.04 + Docker + Claude Code (${{ matrix.arch }})" \
            --tag-specifications "ResourceType=image,Tags=[{Key=Name,Value=$AMI_NAME},{Key=Project,Value=${{ env.PROJECT_TAG }}}]" \
            --query 'ImageId' --output text)
          echo "NEW_AMI=$NEW_AMI" >> "$GITHUB_ENV"
          echo "AMI_NAME=$AMI_NAME" >> "$GITHUB_ENV"
          echo "AMI: $NEW_AMI (${{ matrix.arch }})"

          echo "Waiting for AMI to be available..."
          aws ec2 wait image-available --image-ids "$NEW_AMI"

      - name: Deregister old AMIs
        run: |
          # Keep the 1 most recent AMI per architecture, deregister the rest
          # With 2 architectures × 1 kept = 2 steady state, well under the 5 public AMI limit
          OLD_AMIS=$(aws ec2 describe-images --owners self \
            --filters \
              "Name=tag:Project,Values=${{ env.PROJECT_TAG }}" \
              "Name=architecture,Values=${{ matrix.arch }}" \
            --query 'Images | sort_by(@, &CreationDate) | [:-1].ImageId' \
            --output text)

          for ami in $OLD_AMIS; do
            [[ "$ami" == "None" || -z "$ami" ]] && continue
            echo "Deregistering old AMI: $ami"
            SNAPS=$(aws ec2 describe-images --image-ids "$ami" \
              --query 'Images[0].BlockDeviceMappings[*].Ebs.SnapshotId' --output text)
            aws ec2 deregister-image --image-id "$ami"
            for snap in $SNAPS; do
              [[ "$snap" == "None" || -z "$snap" ]] && continue
              aws ec2 delete-snapshot --snapshot-id "$snap" 2>/dev/null || true
              echo "  Deleted snapshot: $snap"
            done
          done

      - name: Make AMI public
        run: |
          aws ec2 disable-image-block-public-access >/dev/null 2>&1 || true
          aws ec2 modify-image-attribute \
            --image-id "$NEW_AMI" \
            --launch-permission "Add=[{Group=all}]"
          echo "AMI $NEW_AMI is now public"

      - name: Cleanup
        if: always()
        run: |
          # Terminate build instance
          if [[ -n "${INSTANCE_ID:-}" ]]; then
            aws ec2 terminate-instances --instance-ids "$INSTANCE_ID" >/dev/null 2>&1 || true
            echo "Terminated $INSTANCE_ID"
          fi

          # Delete temporary key pair
          if [[ -n "${KEY_NAME:-}" ]]; then
            aws ec2 delete-key-pair --key-name "$KEY_NAME" 2>/dev/null || true
            echo "Deleted key pair $KEY_NAME"
          fi
          rm -f /tmp/build-key.pem

      - name: Summary
        run: |
          echo "## AMI Build Complete (${{ matrix.arch }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **AMI ID:** \`$NEW_AMI\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Name:** $AMI_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Arch:** ${{ matrix.arch }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Region:** $AWS_REGION" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Public:** yes" >> "$GITHUB_STEP_SUMMARY"
