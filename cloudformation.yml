AWSTemplateFormatVersion: "2010-09-09"
Description: "Dev environment - EC2 t3.medium for always-on Claude Code"

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for initial SSH access (before Tailscale is set up)


Resources:
  # --- Security Group ---
  DevSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Dev server - SSH open initially, lock down after setup"
      GroupName: dev-sg
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: "SSH (lock down after setup)"

  # --- EC2 Instance ---
  DevInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.medium
      ImageId: !FindInMap [RegionAMI, !Ref "AWS::Region", AMI]
      KeyName: !Ref KeyPairName
      SecurityGroupIds:
        - !GetAtt DevSecurityGroup.GroupId
      UserData:
        Fn::Base64: |
          #!/bin/bash
          exec > /var/log/install.log 2>&1
          su - ubuntu -c "NON_INTERACTIVE=1 bash -c 'curl -fsSL https://raw.githubusercontent.com/verkyyi/always-on-claude/main/install.sh | bash'"
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: dev-server

# Update the AMI ID for your region. Find the latest Ubuntu 24.04 AMI:
#   aws ec2 describe-images --owners 099720109477 \
#     --filters "Name=name,Values=ubuntu/images/hvm-ssd-gp3/ubuntu-noble-24.04-amd64-server-*" \
#     --query 'Images | sort_by(@, &CreationDate) | [-1].[ImageId,Name]' \
#     --output text
Mappings:
  RegionAMI:
    us-east-1:
      AMI: ami-0136735c2bb5cf5bf  # Ubuntu 24.04 LTS 2026-02-03

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref DevInstance

  PublicIP:
    Description: Public IP (use for initial SSH, then switch to Tailscale)
    Value: !GetAtt DevInstance.PublicIp

  SSHCommand:
    Description: SSH command for initial access
    Value: !Sub "ssh -i ${KeyPairName}.pem ubuntu@${DevInstance.PublicIp}"
