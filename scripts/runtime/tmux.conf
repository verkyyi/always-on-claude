# tmux.conf — always-on-claude host config
# Installed by install.sh to ~/.tmux.conf

# --- Basics ---
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g prefix C-a
unbind C-b
bind C-a send-prefix
set -g history-limit 50000
set -g escape-time 10

# --- Status bar ---
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#1a1b26,fg=#a9b1d6"

# Left: session name (encodes workspace identity from start-claude.sh)
set -g status-left-length 40
set -g status-left "#[fg=#7aa2f7,bold] #S #[fg=#565f89]│"

# Right: active session count
set -g status-right-length 20
set -g status-right "#(bash ~/.tmux-status.sh)"

# Hide window list (single window is typical)
set -g window-status-format ""
set -g window-status-current-format ""
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#565f89"
set -g pane-active-border-style "fg=#7aa2f7"

# Messages
set -g message-style "bg=#1a1b26,fg=#7aa2f7"
set -g message-command-style "bg=#1a1b26,fg=#7aa2f7"
