# tmux-attention.conf — Claude multi-session attention layer.
# Sourced from ~/.tmux.conf. Kept in ~/.claude (which the always-on-claude
# update flow does NOT regenerate) so these survive host re-provisioning; if
# ~/.tmux.conf is ever clobbered, run ~/.claude/reapply-tmux-attention.sh.
#
# Windows recolor by Claude session state, set the instant it changes by
# ~/.claude/settings.json hooks -> ~/.claude/hooks/set-claude-state.sh
# (NOT on the status-interval timer; that only refreshes the CPU/mem right side).
#   cyan  (fg #7dcfff) = busy    -> a tool is executing (PreToolUse)   ]  flicker
#   dim   (fg #565f89) = working -> between tools        (PostToolUse) ]  = alive
#   green (fg #9ece6a) = done    -> turn ended / loop paused or finished (Stop)
#   red   (bg #f7768e) = needs   -> BLOCKED, waiting for your answer (Notification) + bell
# The focused window always shows blue via window-status-current-format.

set -g monitor-bell on
set -g allow-passthrough on
# Keep window numbers contiguous and matching display order (no gaps like 0,1,4,7)
# so prefix+N always targets the Nth window you see. base-index 1 = first window is 1.
set -g base-index 1
set -g renumber-windows on
# Fixed-width 2-col indicator GUTTER so the glyph swaps in place and the name
# never reflows. The ~/.claude/tmux-spinner.sh daemon sets @spin (glyph), @sfg
# (glyph fg hex, pulsing) and @nfg (name fg hex). The #[fg=..] directives are
# written DIRECTLY here (only the hex value is substituted) so styling always
# renders. Current window = plain blue, no spinner (you're already looking at
# it); its 3 leading spaces keep it aligned with the others' 1-pad + 2-col gutter.
set -g window-status-format " #{?@sfg,#[fg=#{@sfg}],}#{?@spin,#{@spin},  }#{?@nfg,#[fg=#{@nfg}],}#I:#W "
set -g window-status-style "fg=#565f89"
set -g window-status-current-format "#[bg=#a9b1d6,fg=#1a1b26,bold]   #I:#W "

# --- keybindings ---
# prefix + a : jump to the next session that needs you (red) or is done (green)
bind a run-shell "sh ~/.claude/next-attention.sh"
# prefix + j : fzf session picker — state dot, branch, ahead/behind, dirty, live preview
bind j display-popup -E -w 90% -h 80% "sh ~/.claude/tmux-session-picker.sh"
# prefix + i : glance open PRs (+CI) & issues for the current window's repo; enter opens in browser
bind i display-popup -E -w 90% -h 80% "sh ~/.claude/gh-glance.sh"
# prefix + r : hot-reload tmux config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded ✓"

# let programs set the client clipboard (OSC52), e.g. gh-glance URL copy
set -g set-clipboard on
